<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elvina Olivia</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      padding: 48px 56px;
      max-width: 520px;
      width: 90%;
      text-align: center;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #fff;
      margin: 0 auto 24px;
    }

    h1 {
      font-size: 2rem;
      color: #222;
      margin-bottom: 8px;
    }

    .greeting {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 2px solid #f0f0f0;
      margin: 24px 0;
    }

    .internship {
      font-size: 1rem;
      color: #555;
      margin-bottom: 16px;
    }

    .internship a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border-radius: 24px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }

    .internship a:hover {
      opacity: 0.85;
    }

    .badge {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>Halo, saya Elvina Olivia!</h1>
    <p class="greeting">
      Selamat datang di halaman GitHub saya. Senang bertemu denganmu!
    </p>
    <span class="badge">✅ Sedang Magang</span>
    <hr class="divider" />
    <div class="internship">
      <p>Saat ini saya sedang menjalani magang di:</p>
      <a href="https://portalonline.id/" target="_blank" rel="noopener noreferrer" aria-label="Kunjungi portalonline.id (membuka tab baru)">
        🌐 portalonline.id
      </a>
    </div>
  </div>
</body>
</html>
